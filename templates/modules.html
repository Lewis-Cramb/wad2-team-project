{% extends 'base.html' %}

{% block title_block %}
    Modules
{% endblock %}

{% block body_block %}
<ul>
{% if modules %}
    {% for m in modules %}        
        <li>
            <a href="{% url 'rateyourmodule:show_module' m.moduleID %}">{{ m.full_name }}</a>
        </li>
    {% endfor %}
{% else %}
    <strong>No modules currently available.</strong>
{% endif %}
{% endblock %}
</ul>
