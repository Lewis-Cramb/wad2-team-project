{% extends 'base.html' %}
{% load staticfiles %}
{% block title_block %}
    Login
{% endblock %}
{% block body_block %}
    <h1>Login to RateYourModule</h1>
    <form id="login_form" method="post" action="{% url 'rateyourmodule:login' %}">
        {% csrf_token %}
        {{ form.as_p }}
        <input type="submit" value="Submit" />
    </form>
{% endblock %}
